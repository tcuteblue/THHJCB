<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電子票證管家</title>
    <!-- 引入自訂 ICON -->
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="shortcut icon" href="icon.png" type="image/png">
    <!-- 引入 Chart.js 圖表套件 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        :root {
            /* Tech Theme Colors */
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 27, 45, 0.7);
            --glass-border: rgba(0, 243, 255, 0.2);
            --text-main: #e2e8f0;
            --text-muted: #8b9bb4;
            
            /* Neon Accents */
            --neon-cyan: #05d9e8;
            --neon-pink: #ff2a6d;
            --neon-green: #01ffc3;
            --neon-orange: #ffb30f;
            --neon-purple: #b366ff;
        }

        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans TC', -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(5, 217, 232, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 42, 109, 0.05), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main); 
            padding-bottom: 80px; 
        }
        
        /* Navbar & Tabs */
        .header { 
            background: rgba(11, 15, 25, 0.8); 
            backdrop-filter: blur(10px);
            color: var(--neon-cyan); 
            padding: 15px 20px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: bold; 
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            letter-spacing: 2px;
            position: sticky; 
            top: 0; 
            z-index: 10; 
            border-bottom: 1px solid var(--glass-border);
            text-shadow: 0 0 10px rgba(5, 217, 232, 0.5);
        }
        
        .tab-content { display: none; padding: 15px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s ease-in-out; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { 
            display: flex; justify-content: space-around; 
            background: rgba(11, 15, 25, 0.85); 
            backdrop-filter: blur(15px);
            position: fixed; bottom: 0; width: 100%; 
            border-top: 1px solid var(--glass-border); 
            padding: 12px 0; z-index: 10; 
        }
        .nav-btn { 
            background: none; border: none; font-size: 14px; 
            color: var(--text-muted); cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; width: 33%; 
            transition: all 0.3s;
        }
        .nav-icon { font-size: 22px; margin-bottom: 4px; transition: all 0.3s;}
        .nav-btn.active { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(5, 217, 232, 0.5); }
        .nav-btn.active .nav-icon { transform: translateY(-3px) scale(1.1); }
        
        /* 緊湊型 Cards (Glassmorphism) */
        .card-item { 
            background: var(--glass-bg); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px; 
            padding: 12px 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px 0 rgba(0, 0, 0, 0.3); 
            position: relative;
            overflow: hidden;
        }
        .card-item::before {
            content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
        }
        
        .card-top-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 8px; }
        .card-title { font-size: 16px; font-weight: bold; letter-spacing: 1px;}
        .card-type { font-size: 11px; padding: 3px 8px; border-radius: 12px; color: #fff; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.5);}
        .type-easy { background: linear-gradient(135deg, #0088A8, var(--neon-cyan)); } 
        .type-ipass { background: linear-gradient(135deg, #F39800, var(--neon-orange)); } 
        .type-icash { background: linear-gradient(135deg, #E60012, var(--neon-pink)); } 
        
        /* 緊湊型 Numbers Info */
        .card-numbers {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.25);
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }
        .card-numbers span { color: var(--text-main); font-weight: bold; }
        
        .card-balance-compact { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; text-align: right; color: #fff; text-shadow: 0 0 10px rgba(5,217,232,0.5);}
        
        .card-info { font-size: 12px; color: var(--text-main); text-align: center; margin-bottom: 10px; min-height: 16px; padding: 6px; background: rgba(0,0,0,0.2); border-radius: 6px; display:flex; justify-content: space-around; align-items:center;}
        
        /* 緊湊型按鈕 Actions */
        .card-actions-compact { display: flex; gap: 6px; justify-content: space-between; }
        .btn-sm { 
            padding: 8px 4px; border: none; border-radius: 8px; font-size: 13px; font-weight: bold;
            cursor: pointer; flex: 1; color: white; min-width: 0;
            transition: all 0.2s; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            text-align: center;
        }
        .btn-sm:active { transform: scale(0.95); }
        
        .btn-sm-deduct { background: linear-gradient(135deg, #d80032, var(--neon-pink)); box-shadow: 0 2px 8px rgba(255,42,109,0.3); }
        .btn-sm-calib { background: linear-gradient(135deg, #d35400, var(--neon-orange)); box-shadow: 0 2px 8px rgba(255,179,15,0.3); }
        .btn-sm-reg { background: linear-gradient(135deg, #6a00f4, var(--neon-purple)); box-shadow: 0 2px 8px rgba(179,102,255,0.3); }
        .btn-sm-edit { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-sm-hist { background: linear-gradient(135deg, #028090, var(--neon-cyan)); color:#000; text-shadow:none;}
        
        /* Overview Chart Area */
        .overview-card {
            background: var(--glass-bg); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px 0 rgba(0, 0, 0, 0.3); 
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }
        .toolbar select {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
        }

        /* PWA Install Button */
        .btn-install {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: #000;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(5,217,232,0.5);
            text-shadow: none;
            border: 1px solid var(--neon-cyan);
            width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 15px; cursor: pointer;
        }

        /* Forms, Settings & Modals (Keep as original tech style) */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--neon-cyan); letter-spacing: 1px;}
        .form-control { 
            width: 100%; padding: 10px; 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; font-size: 15px; color: #fff; transition: all 0.3s;
        }
        .form-control:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(5,217,232,0.3); background: rgba(0,0,0,0.5);}
        select.form-control { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2305d9e8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 10px center; background-size: 1em; }
        select.form-control option { background: var(--bg-color); color: #fff; }
        
        .btn-block { width: 100%; padding: 14px; font-size: 16px; margin-bottom: 10px; background: linear-gradient(135deg, #00b4d8, var(--neon-cyan)); color: #000; font-weight: bold; box-shadow: 0 4px 15px rgba(5,217,232,0.3); border:none; border-radius:8px; cursor:pointer;}
        .btn-action-alt { background: linear-gradient(135deg, #7b2cbf, var(--neon-purple)); color: #fff; box-shadow: 0 4px 15px rgba(179,102,255,0.3);}
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 20; justify-content: center; align-items: center; }
        .modal { background: #161b29; border: 1px solid var(--neon-cyan); padding: 25px; border-radius: 16px; width: 90%; max-width: 380px; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 30px rgba(5,217,232,0.2); }
        .modal h3 { margin-top: 0; color: var(--neon-cyan); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px;}
        .modal-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .btn-cancel { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; box-shadow: none; flex:1; padding:12px; border-radius:8px; cursor:pointer;}

        /* History Items (Color Coded) */
        .history-item { background: var(--glass-bg); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .history-left { display: flex; flex-direction: column; flex: 1; }
        .history-time { font-size: 12px; color: var(--text-muted); font-family: 'Orbitron', sans-serif;}
        .history-desc { font-size: 16px; font-weight: bold; margin-top: 6px; line-height: 1.4; color: #fff;}
        .history-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        .history-amount { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: bold; letter-spacing: 1px;}
        .hist-deduct { border-left: 4px solid var(--neon-pink); background: linear-gradient(90deg, rgba(255,42,109,0.1) 0%, var(--glass-bg) 50%); }
        .hist-topup { border-left: 4px solid var(--neon-cyan); background: linear-gradient(90deg, rgba(5,217,232,0.1) 0%, var(--glass-bg) 50%); }
        .hist-calib { border-left: 4px solid var(--neon-orange); background: linear-gradient(90deg, rgba(255,179,15,0.1) 0%, var(--glass-bg) 50%); }
        .hist-reg { border-left: 4px solid var(--neon-purple); background: linear-gradient(90deg, rgba(179,102,255,0.1) 0%, var(--glass-bg) 50%); }
        .amt-deduct { color: var(--neon-pink); text-shadow: 0 0 8px rgba(255,42,109,0.4);}
        .amt-topup { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(5,217,232,0.4);}
        .amt-calib { color: var(--neon-orange); text-shadow: 0 0 8px rgba(255,179,15,0.4);}
        .amt-reg { color: var(--neon-purple); text-shadow: 0 0 8px rgba(179,102,255,0.4);}
        .btn-edit-hist { margin-top: 10px; padding: 5px 12px; font-size: 12px; cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; transition: all 0.2s;}

        .backup-notice { background: linear-gradient(90deg, rgba(1,255,195,0.1), rgba(1,255,195,0.02)); color: var(--neon-green); padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; margin-bottom: 15px; border: 1px solid rgba(1,255,195,0.3); display: none; box-shadow: 0 0 10px rgba(1,255,195,0.1); }
    </style>
</head>
<body>

    <div class="header">電子票證管家</div>

    <!-- 首頁：卡片清單與總覽 -->
    <div id="tab-cards" class="tab-content active-tab">
        <button id="install-app-btn" class="btn-install" style="display: none;">📲 安裝為 APP</button>
        <div id="last-backup-info" class="backup-notice"></div>
        
        <!-- 統計圖表區塊 -->
        <div class="overview-card" id="overview-container" style="display:none;">
            <div style="text-align:center; font-size:14px; font-weight:bold; color:var(--text-main); letter-spacing:2px; margin-bottom:10px;">總資產分佈</div>
            <div style="position:relative; height: 180px;">
                <canvas id="overviewChart"></canvas>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; pointer-events:none;">
                    <div style="font-size:11px; color:var(--text-muted); letter-spacing:1px;">TOTAL</div>
                    <div style="font-family:'Orbitron', sans-serif; font-size:20px; font-weight:bold; color:var(--neon-cyan); text-shadow:0 0 8px rgba(5,217,232,0.5);" id="total-balance-text">$0</div>
                </div>
            </div>
        </div>

        <!-- 排序工具列 -->
        <div class="toolbar" id="sort-toolbar" style="display:none;">
            <div style="font-size:13px; color:var(--text-muted); white-space:nowrap;">排序方式：</div>
            <select id="card-sort-select" class="form-control" onchange="renderCards()">
                <option value="default">預設 (新增順序)</option>
                <option value="balance-desc">餘額 (高 ➔ 低)</option>
                <option value="balance-asc">餘額 (低 ➔ 高)</option>
                <option value="type">卡片種類</option>
                <option value="topup-desc">總儲值次數 (多 ➔ 少)</option>
                <option value="reg-desc">本年登錄次數 (多 ➔ 少)</option>
            </select>
        </div>

        <div id="cards-container"></div>
    </div>

    <!-- 歷史記錄 -->
    <div id="tab-history" class="tab-content">
        <h3 style="margin-top:0; color:var(--neon-cyan); letter-spacing:1px;">📜 歷史記錄</h3>
        <div class="form-group">
            <select id="history-card-select" class="form-control" onchange="renderHistory()">
                <option value="all">請先選擇卡片...</option>
            </select>
        </div>
        <div id="history-container"></div>
    </div>

    <!-- 設定與管理 -->
    <div id="tab-settings" class="tab-content">
        <div class="card-item" style="padding:20px;">
            <h3 style="margin-top:0; color:var(--neon-cyan);">新增卡片</h3>
            <div class="form-group">
                <label>卡片名稱</label>
                <input type="text" id="new-card-name" class="form-control" placeholder="例如：科技通勤卡">
            </div>
            <div class="form-group">
                <label>卡片種類</label>
                <select id="new-card-type" class="form-control">
                    <option value="悠遊卡">悠遊卡</option>
                    <option value="一卡通">一卡通</option>
                    <option value="愛金卡">愛金卡</option>
                </select>
            </div>
            <div class="form-group">
                <label>信用卡號 (選填)</label>
                <input type="text" id="new-card-credit" class="form-control" placeholder="例如：12345678...">
            </div>
            <div class="form-group">
                <label>票證卡號 (選填)</label>
                <input type="text" id="new-card-transit" class="form-control" placeholder="例如：0123456789">
            </div>
            <div class="form-group">
                <label>初始餘額</label>
                <input type="number" id="new-card-balance" class="form-control" placeholder="0">
            </div>
            <button class="btn-block" onclick="addCard()">新增資料</button>
        </div>

        <div class="card-item" style="margin-top: 20px; padding:20px;">
            <h3 style="margin-top:0; color:var(--neon-purple);">系統與備份</h3>
            <button class="btn-block btn-action-alt" onclick="exportBackup(false)">手動匯出備份檔</button>
            <div class="form-group" style="margin-top: 20px;">
                <label style="color:var(--neon-purple);">匯入備份檔 (將覆蓋現有資料)</label>
                <input type="file" id="import-file" class="form-control" accept=".json" onchange="importBackup(event)" style="font-size:14px; padding:8px;">
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('cards', this)">
            <div class="nav-icon">💳</div>
            <span>我的卡片</span>
        </button>
        <button class="nav-btn" onclick="switchTab('history', this)">
            <div class="nav-icon">📊</div>
            <span>歷史記錄</span>
        </button>
        <button class="nav-btn" onclick="switchTab('settings', this)">
            <div class="nav-icon">⚙️</div>
            <span>系統設定</span>
        </button>
    </div>

    <!-- 操作金額 Modal -->
    <div class="modal-overlay" id="action-modal">
        <div class="modal">
            <h3 id="modal-title">輸入扣款</h3>
            <div class="form-group">
                <label>扣款金額</label>
                <input type="number" id="modal-amount" class="form-control" placeholder="請輸入金額">
            </div>
            <div class="form-group">
                <label>消費明細 (選填)</label>
                <input type="text" id="modal-memo" class="form-control" placeholder="例如：超商買咖啡">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-block" style="margin-bottom:0; flex:1;" onclick="submitAction()">確認執行</button>
            </div>
        </div>
    </div>

    <!-- 編輯交易記錄 Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <h3>編輯記錄</h3>
            <input type="hidden" id="edit-tx-id">
            <div class="form-group">
                <label>日期時間</label>
                <input type="datetime-local" id="edit-datetime" class="form-control">
            </div>
            <div class="form-group">
                <label>金額</label>
                <input type="number" id="edit-amount" class="form-control">
            </div>
            <div class="form-group">
                <label>消費明細</label>
                <input type="text" id="edit-memo" class="form-control" placeholder="可選填">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-block" style="margin-bottom:0; flex:1;" onclick="submitEdit()">儲存變更</button>
            </div>
        </div>
    </div>

    <!-- 編輯卡片資訊 Modal -->
    <div class="modal-overlay" id="edit-card-modal">
        <div class="modal">
            <h3>編輯卡片資訊</h3>
            <input type="hidden" id="edit-card-id">
            <div class="form-group">
                <label>卡片名稱</label>
                <input type="text" id="edit-card-name" class="form-control" placeholder="例如：科技通勤卡">
            </div>
            <div class="form-group">
                <label>卡片種類</label>
                <select id="edit-card-type" class="form-control">
                    <option value="悠遊卡">悠遊卡</option>
                    <option value="一卡通">一卡通</option>
                    <option value="愛金卡">愛金卡</option>
                </select>
            </div>
            <div class="form-group">
                <label>信用卡號 (選填)</label>
                <input type="text" id="edit-card-credit" class="form-control" placeholder="例如：12345678...">
            </div>
            <div class="form-group">
                <label>票證卡號 (選填)</label>
                <input type="text" id="edit-card-transit" class="form-control" placeholder="例如：0123456789">
            </div>
            <div class="form-group">
                <label>本年度登錄次數 <span style="font-size:12px; color:var(--text-muted);">(悠遊卡專用)</span></label>
                <input type="number" id="edit-card-regcount" class="form-control" placeholder="修改登錄次數 (例如：5)" min="0">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeEditCardModal()">取消</button>
                <button class="btn-block" style="margin-bottom:0; flex:1;" onclick="submitEditCard()">儲存變更</button>
            </div>
        </div>
    </div>

    <!-- 編輯餘額 Modal -->
    <div class="modal-overlay" id="balance-modal">
        <div class="modal">
            <h3>校正實際餘額</h3>
            <div class="form-group">
                <label>實際餘額</label>
                <input type="number" id="edit-balance-amount" class="form-control" placeholder="請輸入正確餘額數字">
            </div>
            <p style="font-size:12px; color:var(--text-muted); line-height:1.5;">系統將自動計算差額，並新增一筆「校正」紀錄以平衡帳目，維持歷史資料完整性。</p>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeBalanceModal()">取消</button>
                <button class="btn-block" style="margin-bottom:0; flex:1;" onclick="submitBalanceEdit()">確認校正</button>
            </div>
        </div>
    </div>

    <script>
        // --- 資料初始化與 PWA 設定 ---
        const DB_KEY = 'TransitApp_Data';
        let appData = { cards: [], transactions: [], unsavedCount: 0 };
        let deferredPrompt; // 儲存 PWA 安裝事件
        let overviewChart = null; // 儲存 Chart.js 實例
        
        // Modal 狀態變數
        let currentAction = { cardId: null, type: null };

        function init() {
            setupPWA();
            loadData();
            updateHistorySelect();
            renderCards();
            renderHistory();
            
            // PWA 安裝邏輯
            const installBtn = document.getElementById('install-app-btn');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = 'block';
            });

            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.style.display = 'none';
            });

            window.addEventListener('appinstalled', (e) => {
                deferredPrompt = null;
                installBtn.style.display = 'none';
            });
        }

        function loadData() {
            const data = localStorage.getItem(DB_KEY);
            if (data) appData = JSON.parse(data);
        }

        function saveData() {
            localStorage.setItem(DB_KEY, JSON.stringify(appData));
            updateHistorySelect();
            renderCards();
            renderHistory();
        }

        // --- 輔助功能 ---
        function formatCardNumber(numStr) {
            if (!numStr) return '無';
            const cleaned = String(numStr).replace(/[\s-]/g, '');
            return cleaned.replace(/(.{4})(?!$)/g, '$1-');
        }

        function getTopupCount(cardId) {
            return appData.transactions.filter(t => t.cardId === cardId && t.type === '儲值').length;
        }

        function getYearlyRegCount(cardId) {
            const currentYear = new Date().getFullYear();
            return appData.transactions.filter(t => 
                t.cardId === cardId && 
                t.type === '登錄' && 
                new Date(t.timestamp).getFullYear() === currentYear
            ).length;
        }

        // --- 核心功能：卡片新增與修改 ---
        function addCard() {
            const name = document.getElementById('new-card-name').value.trim();
            const type = document.getElementById('new-card-type').value;
            const creditNum = document.getElementById('new-card-credit').value.trim();
            const transitNum = document.getElementById('new-card-transit').value.trim();
            const balance = parseInt(document.getElementById('new-card-balance').value) || 0;

            if (!name) return alert('請輸入卡片名稱');

            appData.cards.push({ 
                id: Date.now().toString(), 
                type, 
                name, 
                balance,
                creditNum,
                transitNum 
            });
            saveData();
            
            document.getElementById('new-card-name').value = '';
            document.getElementById('new-card-credit').value = '';
            document.getElementById('new-card-transit').value = '';
            document.getElementById('new-card-balance').value = '';
            
            switchTab('cards', document.querySelectorAll('.nav-btn')[0]);
            triggerAutoBackup();
        }

        function openEditCardModal(cardId) {
            const card = appData.cards.find(c => c.id === cardId);
            if (!card) return;
            
            document.getElementById('edit-card-id').value = card.id;
            document.getElementById('edit-card-name').value = card.name;
            document.getElementById('edit-card-type').value = card.type;
            document.getElementById('edit-card-credit').value = card.creditNum || '';
            document.getElementById('edit-card-transit').value = card.transitNum || '';
            
            const currentRegCount = getYearlyRegCount(cardId);
            document.getElementById('edit-card-regcount').value = currentRegCount;
            
            document.getElementById('edit-card-modal').style.display = 'flex';
        }

        function closeEditCardModal() {
            document.getElementById('edit-card-modal').style.display = 'none';
        }

        function submitEditCard() {
            const cardId = document.getElementById('edit-card-id').value;
            const card = appData.cards.find(c => c.id === cardId);
            if (!card) return;

            const name = document.getElementById('edit-card-name').value.trim();
            const type = document.getElementById('edit-card-type').value;
            const creditNum = document.getElementById('edit-card-credit').value.trim();
            const transitNum = document.getElementById('edit-card-transit').value.trim();
            const regCountStr = document.getElementById('edit-card-regcount').value;

            if (!name) return alert('請輸入卡片名稱');

            card.name = name;
            card.type = type;
            card.creditNum = creditNum;
            card.transitNum = transitNum;

            const targetRegCount = parseInt(regCountStr);
            if (!isNaN(targetRegCount) && targetRegCount >= 0) {
                const currentRegCount = getYearlyRegCount(cardId);
                const diff = targetRegCount - currentRegCount;

                if (diff > 0) {
                    for (let i = 0; i < diff; i++) {
                        appData.transactions.push({
                            id: Date.now().toString() + "_reg_edit_" + i,
                            cardId: card.id,
                            timestamp: new Date(Date.now() + i).toISOString(),
                            type: '登錄',
                            amount: 0,
                            memo: '系統校正：手動增加登錄次數'
                        });
                    }
                } else if (diff < 0) {
                    let removed = 0;
                    const currentYear = new Date().getFullYear();
                    for (let i = appData.transactions.length - 1; i >= 0 && removed < Math.abs(diff); i--) {
                        let t = appData.transactions[i];
                        if (t.cardId === card.id && t.type === '登錄' && new Date(t.timestamp).getFullYear() === currentYear) {
                            appData.transactions.splice(i, 1);
                            removed++;
                        }
                    }
                }
            }

            saveData();
            closeEditCardModal();
            triggerAutoBackup();
        }

        // --- 核心功能：交易操作 ---
        function openActionModal(cardId, type) {
            currentAction = { cardId, type };
            if (type === '登錄') {
                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();
                
                const hasRegThisMonth = appData.transactions.some(t => 
                    t.cardId === cardId && 
                    t.type === '登錄' && 
                    new Date(t.timestamp).getFullYear() === currentYear &&
                    new Date(t.timestamp).getMonth() === currentMonth
                );

                if (hasRegThisMonth) {
                    return alert('⛔ 本月已登錄過，活動規定每月僅限登錄一次！');
                }

                if(confirm('確認要在今日新增一筆「回饋10%活動」的登錄記錄嗎？')) {
                    executeAction(cardId, type, 0, '');
                }
            } else {
                document.getElementById('modal-title').innerText = '執行扣款';
                document.getElementById('modal-amount').value = '';
                document.getElementById('modal-memo').value = '';
                document.getElementById('action-modal').style.display = 'flex';
                setTimeout(()=>document.getElementById('modal-amount').focus(), 100);
            }
        }

        function closeModal() {
            document.getElementById('action-modal').style.display = 'none';
        }

        function submitAction() {
            const amount = parseInt(document.getElementById('modal-amount').value);
            const memo = document.getElementById('modal-memo').value.trim();
            
            if (!amount || amount <= 0) return alert('請輸入有效金額');
            
            executeAction(currentAction.cardId, currentAction.type, amount, memo);
            closeModal();
        }

        function executeAction(cardId, type, amount, memo) {
            const card = appData.cards.find(c => c.id === cardId);
            if (!card) return;

            let timestamp = new Date().toISOString();

            if (type === '扣款') {
                if (card.balance - amount < 0) {
                    let needed = amount - card.balance;
                    let topups = Math.ceil(needed / 500);
                    let topupAmt = topups * 500;
                    card.balance += topupAmt;

                    let topupTime = new Date(new Date().getTime() - 1).toISOString();
                    appData.transactions.push({
                        id: Date.now().toString() + "_topup",
                        cardId: cardId,
                        timestamp: topupTime,
                        type: '儲值',
                        amount: topupAmt,
                        memo: '餘額不足，系統自動儲值'
                    });
                }
                card.balance -= amount;
            }

            appData.transactions.push({
                id: Date.now().toString(),
                cardId: cardId,
                timestamp: timestamp,
                type: type,
                amount: amount,
                memo: memo
            });

            saveData();
            triggerAutoBackup();
        }

        function openBalanceModal(cardId) {
            currentAction = { cardId: cardId, type: 'balance' };
            const card = appData.cards.find(c => c.id === cardId);
            if (!card) return;
            document.getElementById('edit-balance-amount').value = card.balance;
            document.getElementById('balance-modal').style.display = 'flex';
            setTimeout(()=>document.getElementById('edit-balance-amount').focus(), 100);
        }

        function closeBalanceModal() {
            document.getElementById('balance-modal').style.display = 'none';
        }

        function submitBalanceEdit() {
            const newBalance = parseInt(document.getElementById('edit-balance-amount').value);
            if (isNaN(newBalance) || newBalance < 0) return alert('請輸入有效的餘額數字 (不可為負數)');

            const card = appData.cards.find(c => c.id === currentAction.cardId);
            if (!card) return;

            const diff = newBalance - card.balance;
            if (diff !== 0) {
                appData.transactions.push({
                    id: Date.now().toString() + "_calibration",
                    cardId: card.id,
                    timestamp: new Date().toISOString(),
                    type: '校正',
                    amount: diff,
                    memo: '系統手動校正餘額'
                });
                card.balance = newBalance;
                saveData();
                triggerAutoBackup();
            }
            closeBalanceModal();
        }

        // --- 編輯功能 (歷史紀錄) ---
        function openEditModal(txId) {
            const tx = appData.transactions.find(t => t.id === txId);
            if(!tx) return;
            
            document.getElementById('edit-tx-id').value = tx.id;
            const d = new Date(tx.timestamp);
            const pad = (n) => n.toString().padStart(2, '0');
            const dtStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;

            document.getElementById('edit-datetime').value = dtStr;
            document.getElementById('edit-amount').value = tx.amount || 0;
            document.getElementById('edit-amount').disabled = (tx.type === '登錄' || tx.type === '校正'); 
            document.getElementById('edit-memo').value = tx.memo || '';

            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        function submitEdit() {
            const txId = document.getElementById('edit-tx-id').value;
            const tx = appData.transactions.find(t => t.id === txId);
            const card = appData.cards.find(c => c.id === tx.cardId);

            const dtInput = document.getElementById('edit-datetime').value;
            if(!dtInput) return alert('請輸入完整的日期時間');
            const newTimestamp = new Date(dtInput).toISOString();
            
            const newAmount = parseInt(document.getElementById('edit-amount').value) || 0;
            const newMemo = document.getElementById('edit-memo').value.trim();

            if (tx.type !== '登錄' && tx.type !== '校正' && newAmount < 0) return alert('金額不可為負數');

            if (tx.type === '扣款') card.balance += tx.amount;
            else if (tx.type === '儲值') card.balance -= tx.amount;

            if (tx.type === '扣款') {
                if (card.balance - newAmount < 0) {
                    let needed = newAmount - card.balance;
                    let topups = Math.ceil(needed / 500);
                    let topupAmt = topups * 500;
                    card.balance += topupAmt;
                    
                    appData.transactions.push({
                        id: Date.now().toString() + "_topup_edit",
                        cardId: card.id,
                        timestamp: newTimestamp,
                        type: '儲值',
                        amount: topupAmt,
                        memo: '自動儲值 (由編輯觸發)'
                    });
                }
                card.balance -= newAmount;
                tx.amount = newAmount;
            } else if (tx.type === '儲值') {
                card.balance += newAmount;
                tx.amount = newAmount;
            }

            tx.timestamp = newTimestamp;
            tx.memo = newMemo;

            saveData();
            closeEditModal();
            triggerAutoBackup();
        }

        // --- Chart 繪製 ---
        function renderOverviewChart(cardsData) {
            const ctx = document.getElementById('overviewChart');
            if (!ctx || typeof Chart === 'undefined') return;

            if (overviewChart) {
                overviewChart.destroy();
            }

            const totalBalance = cardsData.reduce((sum, card) => sum + card.balance, 0);
            document.getElementById('total-balance-text').innerText = `$${totalBalance.toLocaleString()}`;

            const labels = cardsData.map(c => c.name);
            const data = cardsData.map(c => c.balance);
            const bgColors = ['#05d9e8', '#ff2a6d', '#01ffc3', '#ffb30f', '#b366ff', '#f39c12', '#3498db'];

            overviewChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: bgColors,
                        borderWidth: 2,
                        borderColor: '#0b0f19'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { 
                            position: 'right', 
                            labels: { color: '#8b9bb4', font: {family: "'Noto Sans TC', sans-serif", size: 11}, boxWidth: 12 } 
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.label || '';
                                    if (label) { label += ': '; }
                                    if (context.parsed !== null) { label += '$' + context.parsed.toLocaleString(); }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        }

        // --- UI 渲染 ---
        function updateHistorySelect() {
            const select = document.getElementById('history-card-select');
            const currentVal = select.value;
            select.innerHTML = '<option value="all">請選擇卡片...</option>';
            appData.cards.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name} (${c.type})</option>`;
            });
            if(appData.cards.find(c => c.id === currentVal)) {
                select.value = currentVal;
            }
        }

        function viewHistory(cardId) {
            document.getElementById('history-card-select').value = cardId;
            switchTab('history', document.querySelectorAll('.nav-btn')[1]);
            renderHistory();
        }

        function renderCards() {
            const backupInfoEl = document.getElementById('last-backup-info');
            if (appData.lastBackupTime) {
                const d = new Date(appData.lastBackupTime);
                const timeStr = `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                backupInfoEl.innerHTML = `✅ 系統已於 <b>${timeStr}</b> 完成本機備份下載`;
                backupInfoEl.style.display = 'block';
            } else {
                backupInfoEl.style.display = 'none';
            }

            const container = document.getElementById('cards-container');
            const overviewContainer = document.getElementById('overview-container');
            const sortToolbar = document.getElementById('sort-toolbar');
            container.innerHTML = '';
            
            if (appData.cards.length === 0) {
                overviewContainer.style.display = 'none';
                sortToolbar.style.display = 'none';
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:50px;">資料庫無卡片紀錄<br>請至「系統設定」建立新卡片</p>';
                return;
            }

            overviewContainer.style.display = 'block';
            sortToolbar.style.display = 'flex';

            // --- 執行排序 ---
            let sortedCards = [...appData.cards];
            const sortType = document.getElementById('card-sort-select').value;
            
            if (sortType === 'balance-desc') {
                sortedCards.sort((a,b) => b.balance - a.balance);
            } else if (sortType === 'balance-asc') {
                sortedCards.sort((a,b) => a.balance - b.balance);
            } else if (sortType === 'type') {
                sortedCards.sort((a,b) => a.type.localeCompare(b.type));
            } else if (sortType === 'topup-desc') {
                sortedCards.sort((a,b) => getTopupCount(b.id) - getTopupCount(a.id));
            } else if (sortType === 'reg-desc') {
                sortedCards.sort((a,b) => getYearlyRegCount(b.id) - getYearlyRegCount(a.id));
            }

            // 繪製圖表
            renderOverviewChart(sortedCards);

            const currentYear = new Date().getFullYear();
            const currentMonth = new Date().getMonth();

            sortedCards.forEach(card => {
                let typeClass = card.type === '悠遊卡' ? 'type-easy' : (card.type === '一卡通' ? 'type-ipass' : 'type-icash');
                
                let infoHtml = '';
                let regBtnHtml = '';
                
                const hasTopupThisMonth = appData.transactions.some(t => 
                    t.cardId === card.id && 
                    t.type === '儲值' && 
                    new Date(t.timestamp).getFullYear() === currentYear &&
                    new Date(t.timestamp).getMonth() === currentMonth
                );

                if(hasTopupThisMonth) {
                    const displayMonth = currentMonth + 1;
                    infoHtml += `<div style="color:var(--neon-green); font-weight:bold; text-shadow:0 0 5px rgba(1,255,195,0.4);">⚡ ${displayMonth}月已自動儲值</div>`;
                } else {
                    infoHtml += `<div style="color:var(--text-muted);">無最新儲值</div>`;
                }
                
                if (card.type === '悠遊卡') {
                    const regCount = getYearlyRegCount(card.id);
                    infoHtml += `<div style="border-left:1px solid rgba(255,255,255,0.1); padding-left:10px;">登錄: <b style="color:var(--neon-purple);">${regCount}</b> 次</div>`;
                    regBtnHtml = `<button class="btn-sm btn-sm-reg" onclick="openActionModal('${card.id}', '登錄')">登錄</button>`;
                }
                
                const formattedCredit = formatCardNumber(card.creditNum);
                const formattedTransit = formatCardNumber(card.transitNum);

                // 將所有動作整合到緊湊的快捷列
                container.innerHTML += `
                    <div class="card-item">
                        <div class="card-top-row">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="card-type ${typeClass}">${card.type}</div>
                                <div class="card-title">${card.name}</div>
                            </div>
                            <div class="card-balance-compact">$${card.balance.toLocaleString()}</div>
                        </div>
                        
                        <div class="card-numbers">
                            <div>💳 信: <span>${formattedCredit}</span></div>
                            <div>🎫 票: <span>${formattedTransit}</span></div>
                        </div>
                        
                        <div class="card-info">${infoHtml}</div>
                        
                        <div class="card-actions-compact">
                            <button class="btn-sm btn-sm-deduct" onclick="openActionModal('${card.id}', '扣款')">扣款</button>
                            <button class="btn-sm btn-sm-calib" onclick="openBalanceModal('${card.id}')">校正</button>
                            ${regBtnHtml}
                            <button class="btn-sm btn-sm-edit" onclick="openEditCardModal('${card.id}')">編輯</button>
                            <button class="btn-sm btn-sm-hist" onclick="viewHistory('${card.id}')">記錄</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const selectedId = document.getElementById('history-card-select').value;
            container.innerHTML = '';
            
            let filtered = appData.transactions;
            
            if (selectedId && selectedId !== 'all') {
                filtered = filtered.filter(t => t.cardId === selectedId);
            } else {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:30px;">請從上方選單選擇目標卡片</p>';
                return;
            }

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:30px;">查無歷史記錄資料</p>';
                return;
            }

            const sorted = [...filtered].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            sorted.forEach(t => {
                const dateObj = new Date(t.timestamp);
                const timeStr = `${dateObj.getFullYear()}/${(dateObj.getMonth()+1).toString().padStart(2,'0')}/${dateObj.getDate().toString().padStart(2,'0')} ${dateObj.getHours().toString().padStart(2,'0')}:${dateObj.getMinutes().toString().padStart(2,'0')}`;
                
                let amtHtml = '';
                let typeStyleClass = '';

                if (t.type === '扣款') {
                    typeStyleClass = 'hist-deduct';
                    amtHtml = `<span class="history-amount amt-deduct">- $${t.amount.toLocaleString()}</span>`;
                } else if (t.type === '儲值') {
                    typeStyleClass = 'hist-topup';
                    amtHtml = `<span class="history-amount amt-topup">+ $${t.amount.toLocaleString()}</span>`;
                } else if (t.type === '校正') {
                    typeStyleClass = 'hist-calib';
                    const sign = t.amount > 0 ? '+' : '-';
                    amtHtml = `<span class="history-amount amt-calib">${sign} $${Math.abs(t.amount).toLocaleString()}</span>`;
                } else if (t.type === '登錄') {
                    typeStyleClass = 'hist-reg';
                    amtHtml = `<span class="history-amount amt-reg" style="font-size:14px;">[ 系統紀錄 ]</span>`;
                }

                let memoHtml = t.memo ? `<span style="font-size:13px; color:var(--text-muted); font-weight:normal;"> <br>📝 ${t.memo}</span>` : '';

                container.innerHTML += `
                    <div class="history-item ${typeStyleClass}">
                        <div class="history-left">
                            <div class="history-time">${timeStr}</div>
                            <div class="history-desc">${t.type}${memoHtml}</div>
                        </div>
                        <div class="history-right">
                            ${amtHtml}
                            <button class="btn-edit-hist" onclick="openEditModal('${t.id}')">編輯</button>
                        </div>
                    </div>
                `;
            });
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`tab-${tabId}`).classList.add('active-tab');
            
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            if(tabId === 'cards') window.scrollTo(0,0);
        }

        // --- 備份與還原 ---
        function triggerAutoBackup() {
            appData.unsavedCount = (appData.unsavedCount || 0) + 1;
            saveData();
            setTimeout(() => {
                if (appData.unsavedCount >= 10) {
                    exportBackup(true); 
                }
            }, 300);
        }

        function exportBackup(isAuto) {
            appData.unsavedCount = 0;
            appData.lastBackupTime = new Date().toISOString();
            saveData();

            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const dateObj = new Date();
            const dateStr = `${dateObj.getFullYear()}${(dateObj.getMonth()+1).toString().padStart(2,'0')}${dateObj.getDate().toString().padStart(2,'0')}_${dateObj.getHours().toString().padStart(2,'0')}${dateObj.getMinutes().toString().padStart(2,'0')}`;
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `票證備份_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            if(!isAuto) alert('備份檔下載程序已啟動！');
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData.cards && importedData.transactions) {
                        appData = importedData;
                        saveData();
                        alert('資料庫還原成功！');
                        switchTab('cards', document.querySelectorAll('.nav-btn')[0]);
                    } else {
                        alert('檔案格式解析錯誤。');
                    }
                } catch (err) {
                    alert('讀取檔案失敗：' + err.message);
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        // --- 單檔 PWA 動態生成 ---
        function setupPWA() {
            const manifest = {
                name: "電子票證管家",
                short_name: "票證管家",
                display: "standalone",
                background_color: "#0b0f19",
                theme_color: "#0b0f19",
                icons: [
                    {
                        src: "icon.png",
                        sizes: "64x64 32x32 24x24 16x16 512x512",
                        type: "image/png"
                    },
                    {
                        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2305d9e8'/%3E%3Ctext x='50' y='65' font-size='50' font-weight='bold' font-family='sans-serif' text-anchor='middle' fill='%230b0f19'%3E卡%3C/text%3E%3C/svg%3E",
                        sizes: "512x512",
                        type: "image/svg+xml"
                    }
                ],
                start_url: window.location.href
            };
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            const manifestUrl = URL.createObjectURL(manifestBlob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);

            const swCode = `
                self.addEventListener('fetch', event => {
                    event.respondWith(
                        fetch(event.request).then(response => {
                            return caches.open('transit-pwa-cache').then(cache => {
                                cache.put(event.request, response.clone());
                                return response;
                            });
                        }).catch(() => {
                            return caches.match(event.request);
                        })
                    );
                });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(swBlob);

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register(swUrl).then(() => {
                    console.log('PWA System Active');
                }).catch(err => console.log('SW Error', err));
            }
        }

        window.onload = init;
    </script>
